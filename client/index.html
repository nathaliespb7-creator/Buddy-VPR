<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover, user-scalable=yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="Бадди ВПР — тренажёр для подготовки к всероссийским проверочным работам (ВПР) для 4-8 классов. Офлайн-режим, геймификация, персональный прогресс." />
    <meta name="theme-color" content="#E6FFFA" />
    <meta property="og:title" content="Бадди ВПР — Умный помощник для подготовки" />
    <meta property="og:description" content="Готовься к ВПР с умом: офлайн-режим, острова заданий, персонаж Бадди и прогресс в звёздах." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Шрифт подгружается асинхронно, чтобы не блокировать отрисовку (важно для медленных сетей и РФ) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap"></noscript>
    <title>Бадди ВПР — Умный помощник для подготовки</title>
    <!-- mobile-ui: компактная шапка и один экран — одно задание (обновите без кэша, если не видите изменений) -->
  </head>
  <body style="margin:0;background:#e6f7f5;">
    <div id="root" style="min-height:100vh;background:#e6f7f5;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:1rem;">
      <p style="color:#334155;margin:0;font-size:1.125rem;">Загрузка…</p>
      <p style="color:#64748b;font-size:0.875rem;margin-top:0.5rem;">Если страница не открылась — проверьте консоль (F12).</p>
    </div>
    <script>
      (function(){
        var t1=setTimeout(function(){
          var r=document.getElementById('root');
          if(r&&!r.querySelector('button')){
            var p=r.querySelector('p');
            if(p&&p.textContent.indexOf('Загрузка')!==-1) p.innerHTML='Загрузка… (ещё подождите)';
          }
        },5000);
        var t2=setTimeout(function(){
          clearTimeout(t1);
          var r=document.getElementById('root');
          if(r&&r.textContent.indexOf('Обновить')===-1&&!r.querySelector('button')){
            r.innerHTML='<p style="color:#334155;margin-bottom:1rem;">Загрузка занимает много времени.</p><p style="color:#64748b;font-size:0.875rem;margin-bottom:1rem;">Попробуйте обновить страницу (F5) или откройте в другом браузере.</p><button type="button" onclick="location.reload()" style="padding:0.5rem 1rem;background:#0d9488;color:white;border:none;border-radius:8px;cursor:pointer;">Обновить</button>';
          }
        },25000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
