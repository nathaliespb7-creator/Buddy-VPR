name: Deploy to Yandex Object Storage

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
      
      - name: Install S3CMD
        run: |
          sudo apt-get update
          sudo apt-get install -y s3cmd

      - name: Configure S3CMD
        run: |
          echo "[default]" > ~/.s3cfg
          echo "access_key = ${{ secrets.YC_ACCESS_KEY_ID }}" >> ~/.s3cfg
          echo "secret_key = ${{ secrets.YC_SECRET_ACCESS_KEY }}" >> ~/.s3cfg
          echo "host_bucket = %(bucket)s.storage.yandexcloud.net" >> ~/.s3cfg
          echo "host_base = storage.yandexcloud.net" >> ~/.s3cfg
          echo "use_https = True" >> ~/.s3cfg
          echo "ssl_verify_cert = False" >> ~/.s3cfg
          echo "acl_public = True" >> ~/.s3cfg

      - name: Upload to Yandex
        env:
          BUCKET_NAME: buddy-vpr-static-natalia
        run: |
          s3cmd put dist/* s3://${{ env.BUCKET_NAME }}/

